server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      metrics:
        enabled: true
      server:
        webflux:
          metrics:
            path-tags:
              enabled: true
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userOrIpKeyResolver}"
                    redis-rate-limiter.replenishRate: 3
                    redis-rate-limiter.burstCapacity: 6
                    redis-rate-limiter.requestedTokens: 1

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userOrIpKeyResolver}"
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1

            - id: community-service
              uri: lb://community-service
              predicates:
                - Path=/api/communities/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userOrIpKeyResolver}"
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1

            - id: post-service
              uri: lb://post-service
              predicates:
                - Path=/api/posts/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userOrIpKeyResolver}"
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1

            - id: comment-service
              uri: lb://comment-service
              predicates:
                - Path=/api/comments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userOrIpKeyResolver}"
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1

            - id: vote-service
              uri: lb://vote-service
              predicates:
                - Path=/api/votes/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userOrIpKeyResolver}"
                    redis-rate-limiter.replenishRate: 3
                    redis-rate-limiter.burstCapacity: 6
                    redis-rate-limiter.requestedTokens: 1

            - id: feed-service
              uri: lb://feed-service
              predicates:
                - Path=/api/feed/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userOrIpKeyResolver}"
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userOrIpKeyResolver}"
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1

            - id: auth-service-openapi
              uri: lb://auth-service
              predicates:
                - Path=/v3/api-docs/auth-service
              filters:
                - SetPath=/v3/api-docs

            - id: user-service-openapi
              uri: lb://user-service
              predicates:
                - Path=/v3/api-docs/user-service
              filters:
                - SetPath=/v3/api-docs

            - id: community-service-openapi
              uri: lb://community-service
              predicates:
                - Path=/v3/api-docs/community-service
              filters:
                - SetPath=/v3/api-docs

            - id: post-service-openapi
              uri: lb://post-service
              predicates:
                - Path=/v3/api-docs/post-service
              filters:
                - SetPath=/v3/api-docs

            - id: comment-service-openapi
              uri: lb://comment-service
              predicates:
                - Path=/v3/api-docs/comment-service
              filters:
                - SetPath=/v3/api-docs

            - id: vote-service-openapi
              uri: lb://vote-service
              predicates:
                - Path=/v3/api-docs/vote-service
              filters:
                - SetPath=/v3/api-docs

            - id: feed-service-openapi
              uri: lb://feed-service
              predicates:
                - Path=/v3/api-docs/feed-service
              filters:
                - SetPath=/v3/api-docs

            - id: notification-service-openapi
              uri: lb://notification-service
              predicates:
                - Path=/v3/api-docs/notification-service
              filters:
                - SetPath=/v3/api-docs
app:
  jwt:
    issuer: redditx-auth-service
    secret: ${JWT_SECRET:redditx-super-secret-key-for-local-development-only-please-change-later-123456}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth-service
      - name: User Service
        url: /v3/api-docs/user-service
      - name: Community Service
        url: /v3/api-docs/community-service
      - name: Post Service
        url: /v3/api-docs/post-service
      - name: Comment Service
        url: /v3/api-docs/comment-service
      - name: Vote Service
        url: /v3/api-docs/vote-service
      - name: Feed Service
        url: /v3/api-docs/feed-service
      - name: Notification Service
        url: /v3/api-docs/notification-service