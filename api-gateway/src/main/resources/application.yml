server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            - id: community-service
              uri: lb://community-service
              predicates:
                - Path=/api/communities/**

            - id: post-service
              uri: lb://post-service
              predicates:
                - Path=/api/posts/**

            - id: comment-service
              uri: lb://comment-service
              predicates:
                - Path=/api/comments/**

            - id: vote-service
              uri: lb://vote-service
              predicates:
                - Path=/api/votes/**

            - id: feed-service
              uri: lb://feed-service
              predicates:
                - Path=/api/feed/**

app:
  jwt:
    issuer: redditx-auth-service
    secret: ${JWT_SECRET:redditx-super-secret-key-for-local-development-only-please-change-later-123456}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info