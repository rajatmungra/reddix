server:
  port: 8084

spring:
  application:
    name: post-service

  datasource:
    url: jdbc:postgresql://localhost:5433/redditx_post
    username: redditx
    password: redditx

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

app:
  jwt:
    issuer: redditx-auth-service
    secret: ${JWT_SECRET:redditx-super-secret-key-for-local-development-only-please-change-later-123456}

  internal:
    secret: ${INTERNAL_SECRET:redditx-internal-secret-local-only}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info