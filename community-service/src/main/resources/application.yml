server:
  port: 8083

spring:
  application:
    name: community-service

  datasource:
    url: jdbc:postgresql://localhost:5433/redditx_community
    username: redditx
    password: redditx

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    issuer: redditx-auth-service
    secret: ${JWT_SECRET:redditx-super-secret-key-for-local-development-only-please-change-later-123456}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info