server:
  port: 8082

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5433/redditx_user
    username: redditx
    password: redditx

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    issuer: redditx-auth-service
    secret: ${JWT_SECRET:redditx-super-secret-key-for-local-development-only-please-change-later-123456}

  internal:
    secret: ${INTERNAL_SECRET:redditx-internal-secret-local-only}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true